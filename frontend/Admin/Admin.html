<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Панель адміністратора Медичного Діагностичного Центру — управління лікарями, послугами та користувачами.">
    <title>Адмін Панель | МДЦ</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Utils/shared.css">
    <link rel="stylesheet" href="../Header/header.css">
    <link rel="stylesheet" href="Admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div id="header-container"></div>

    <main class="admin-main">
        <div class="admin-main-wrapper">
            <div class="container admin-container">

                <header class="admin-page-header">
                    <h1>Панель Адміністратора</h1>
                    <p id="auth-status-message" class="info-message">Перевірка доступу...</p>
                </header>

                <div id="admin-content" style="display: none;">

                    <section class="admin-tools">
                        <h2>⚙️ Інструменти управління</h2>
                        <div class="tools-grid tab-navigation">
                            <button class="tool-btn tab-button active" data-action="manage-doctors"><i class="fas fa-user-md"></i> Лікарі</button>
                            <button class="tool-btn tab-button" data-action="manage-services"><i class="fas fa-notes-medical"></i> Послуги</button>
                            <button class="tool-btn tab-button" data-action="view-users"><i class="fas fa-users-cog"></i> Користувачі</button>
                        </div>
                    </section>

                    <div id="tool-details-container" class="tool-details-container tab-content-style">
                    </div>

                    <section class="admin-dashboard">
                        <h2>Огляд та Статистика</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <i class="fas fa-calendar-check stat-icon-success"></i>
                                <h3>Всього записів сьогодні</h3>
                                <p id="today-appointments-count">...</p>
                            </div>
                            <div class="stat-card">
                                <i class="fas fa-users stat-icon-primary"></i>
                                <h3>Всього користувачів</h3>
                                <p id="total-users-count">...</p>
                            </div>
                            <div class="stat-card">
                                <i class="fas fa-stethoscope stat-icon-warning"></i>
                                <h3>Активні послуги</h3>
                                <p id="active-services-count">...</p>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script src="../Header/loadHeader.js"></script>
    <script src="../Home/auth.js"></script>
    <script type="module" src="adminDoctors.js"></script>
    <script type="module" src="adminServices.js"></script>
    <script type="module" src="adminUsers.js"></script>
    <script type="module" src="admin.js"></script>

    <script>
        function initializeAdminPanel() {
            if (typeof initAdminPanel !== 'undefined') {
                initAdminPanel();
            } else {
                console.error('initAdminPanel не визначена. Переконайтеся, що admin.js завантажено.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const containerId    = 'header-container';
            const headerPath     = '../Header/header.html';
            const currentPageTitle = 'Адмін';

            if (typeof loadHeader !== 'undefined') {
                loadHeader(containerId, headerPath, currentPageTitle, initializeAdminPanel);
            } else {
                console.error('loadHeader функція не визначена.');
            }
        });
    </script>
</body>
</html>
