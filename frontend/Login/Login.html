<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <div class="center-container">
        <div class="login-card">

            <form id="login-form">

                <h2 class="title">Вхід</h2>

                <div class="form-group">
                    <label for="email"><strong>Email</strong></label>
                    <input type="email" id="email" name="email" placeholder="Введіть Email">
                    <span id="email-error" class="error"></span>
                </div>

                <div class="form-group">
                    <label for="password"><strong>Пароль</strong></label>
                    <input type="password" id="password" name="password" placeholder="Введіть Пароль">
                    <span id="password-error" class="error"></span>
                </div>

                <button type="submit" class="btn-submit">Увійти</button>

                <a href="../Signup/Signup.html" class="btn-link">Створити Обліковий Запис</a>

            </form>

        </div>
    </div>

    <script src="Login.js" type="module"></script>
    
    </body>
</html>
