<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вхід до особистого кабінету Медичного Діагностичного Центру.">
    <title>Вхід | МДЦ</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Utils/shared.css">
    <link rel="stylesheet" href="../Utils/auth-form.css">
    <link rel="stylesheet" href="Login.css">
</head>
<body>

    <div class="center-container">
        <div class="auth-card">
            <form id="login-form" novalidate>
                <h1 class="form-title">Вхід</h1>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Введіть Email" autocomplete="email">
                    <span id="email-error" class="field-error" role="alert"></span>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введіть Пароль" autocomplete="current-password">
                    <span id="password-error" class="field-error" role="alert"></span>
                </div>

                <button type="submit" class="btn-submit">Увійти</button>
                <a href="../Signup/Signup.html" class="btn-link">Створити Обліковий Запис</a>
            </form>
        </div>
    </div>

    <script src="Login.js" type="module"></script>
</body>
</html>
