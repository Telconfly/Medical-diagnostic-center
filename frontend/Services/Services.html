<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наші Послуги</title>
    
    <link rel="stylesheet" href="../Header/header.css"> 
    <link rel="stylesheet" href="../Home/Home.css"> 
    <link rel="stylesheet" href="./Services.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header-placeholder"></div>
    
    <main>
        <section class="page-hero-banner"> 
            <div class="container">
                <h1>Наші Послуги та Діагностика</h1>
                <p>Широкий спектр сучасних діагностичних процедур для вашого здоров'я.</p>
            </div>
        </section>

        <section class="services-list-section"> 
            <div class="container">
                <div class="search-filter-container" style="margin-bottom: 30px;">
                    <p class="search-1">Пошук</p>
                    <input type="text" id="service-search-input" placeholder="Швидкий пошук послуг за назвою або описом..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                </div>
                <div class="services-grid" id="services-container">
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2025 Медичний Діагностичний Центр. Всі права захищені.</p>
        </div>
    </footer>
    
    <div id="appointment-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Запис на послугу</h2>
            
            <form id="service-appointment-form">
                <p>Ви записуєтеся на: <strong id="modal-service-name" style="color: #007bff;">Назва Послуги</strong></p>
                
                <label for="userName">Ваше Ім'я:</label>
                <input type="text" id="userName" name="userName" required readonly>

                <label for="userEmail">Ваша Пошта (Email):</label>
                <input type="email" id="userEmail" name="userEmail" required readonly>

                <label for="appointmentDate">Дата:</label>
                <input type="date" id="appointmentDate" name="appointmentDate" required>
                
                <label>Оберіть час:</label>
                <div id="timeSlotsContainer" class="time-slots-container"></div>
                <input type="hidden" id="appointmentTime" name="appointmentTime" required>
                
                <div id="timeSelectionError" class="message" style="display:none; color: #721c24; background-color: #f8d7da; border-color: #f5c6cb;">Будь ласка, оберіть час.</div>
                
                <button type="submit" id="submitAppointmentBtn">Підтвердити Запис</button>
                <p id="form-message" class="message"></p>
            </form>
        </div>
    </div>
    
    <script src="../Header/loadHeader.js"></script>
    <script src="../Home/auth.js"></script>
    
    <script src="./SearchFilter.js"></script>
    <script src="./Services.js"></script>
    <script>

        loadHeader('header-placeholder', '../Header/header.html', 'Діагностика');
    </script>
</body>
</html>
