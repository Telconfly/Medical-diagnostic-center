<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль Користувача - МДЦ</title>
    
        <link rel="stylesheet" href="../Header/header.css">
    
        <link rel="stylesheet" href="../Home/Home.css"> 
    
        <link rel="stylesheet" href="Profile.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="header-placeholder"></div>
    
    <main class="profile-main">
        <div class="container profile-container">
            <h2>Мій Профіль</h2>

            <div class="tab-navigation">
                <button class="tab-button active" data-tab="profile">Дані Профілю</button>
                <button class="tab-button" data-tab="doctor-history">Історія Консультацій</button>
                <button class="tab-button" data-tab="service-history">Історія Діагностик</button>
                <button class="tab-button" data-tab="password">Змінити Пароль</button> </div>
            <div id="profile-message" class="message-area" style="display: none;"></div>

            <div id="profile-tab" class="tab-content active">
                <form id="profile-form" enctype="multipart/form-data"> 
                    <div class="form-group">
                        <label for="name">Ім'я:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email (незмінний):</label>
                        <input type="email" id="email" name="email" disabled>
                    </div>

                    <div id="user-only-fields">
                        <div class="form-group">
                            <label for="phone">Телефон:</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        <div class="form-group">
                            <label for="address">Адреса:</label>
                            <input type="text" id="address" name="address">
                        </div>
                        <div class="form-group">
                            <label for="dateOfBirth">Дата народження:</label>
                            <input type="date" id="dateOfBirth" name="dateOfBirth">
                        </div>
                        <div class="form-group">
                            <label for="bio">Про себе:</label>
                            <textarea id="bio" name="bio" rows="4"></textarea>
                        </div>
                    </div>
                    <div id="doctor-fields" style="display: none;">
                        <h3>Дані Лікаря</h3>

                        <div class="form-group current-photo-group">
                            <label>Поточна фотографія:</label>
                            <div id="current-doctor-image-container" class="current-image-container">
                                <p id="no-image-text">Фото відсутнє</p> 
                            </div>
                        </div>

                        <div class="form-group photo-upload-group">
                            <label for="doctorImage">Оновити фото:</label>
                            <input type="file" id="doctorImage" name="doctorImage" accept="image/*">
                            <small>Дозволені формати: JPG, PNG.</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="specialization">Спеціалізація:</label>
                            <input type="text" id="specialization" name="specialization">
                        </div>
                        
                        <div class="form-group">
                            <label for="price">Ціна консультації (грн):</label>
                            <input type="number" step="0.01" id="price" name="price">
                        </div>
                        
                        <div class="form-group">
                            <label for="experience">Досвід (роки):</label>
                            <input type="number" id="experience" name="experience">
                        </div>
                        
                        <div class="form-group">
                            <label for="doctorDescription">Детальний опис/Профайл:</label>
                            <textarea id="doctorDescription" name="doctorDescription" rows="6"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Зберегти Зміни</button>
                </form>
            </div>
            <div id="doctor-history-tab" class="tab-content">
                <h3>Історія Записів та Консультацій</h3>
                <div id="appointments-history">
                    </div>
                <div id="my-doctor-appointments-history" style="margin-top: 30px;">
                    </div>
            </div>
            <div id="service-history-tab" class="tab-content">
                <h3>Історія Записів на Послуги (Діагностика)</h3>
                <div id="service-appointments-history">
                    </div>
            </div>

            <div id="password-tab" class="tab-content">
                <h3>Змінити Пароль</h3>
                <form id="password-form"> 
                    <div class="form-group">
                        <label for="currentPassword">Поточний Пароль:</label>
                        <input type="password" id="currentPassword" name="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Новий Пароль:</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="6">
                        <small>Мінімум 6 символів.</small>
                    </div>
                    <div class="form-group">
                        <label for="confirmNewPassword">Підтвердіть Новий Пароль:</label>
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">Зберегти Новий Пароль</button>
                </form>
            </div>
            </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2025 Медичний Діагностичний Центр. Всі права захищені.</p>
        </div>
    </footer>

        <script src="../Header/loadHeader.js"></script> 
        <script src="../Home/auth.js"></script>
        <script src="./Profile.js"></script>
        <script src="./PasswordUpdate.js"></script> <script>
        loadHeader('header-placeholder', '../Header/header.html', 'Профіль');
    </script>
</body>
</html>
